[Settings]
; --- Profile mode ---
; When ActiveProfile is set, game-specific settings are loaded from
; profiles/<name>.ini.  Use the menu's P option to create/switch profiles.
ActiveProfile = 
; Example: ActiveProfile = Cyberpunk 2077

; --- Legacy (no-profile) mode ---
; If ActiveProfile is empty, settings below are used directly.
; (Example values - adjust for your game.)
GameExecutablePath = C:\Program Files\Your Game\Game.exe
GameProcessName = Game.exe
SourceSavePath = C:\Users\YourName\Saved Games\Your Game
BackupStoragePath = C:\Users\YourName\TimeCapsuleBackups
SessionName = default
SaveFrequencyMinutes = 5
MaxAutoSaves = 50
LaunchBackup = yes

[Documentation]
Info = Edit config.ini or use the Time Capsule menu to create per-game profiles.
ActiveProfile = Name of a profile in the profiles/ folder. Leave empty for legacy mode.
GameExecutablePath = Full path to your game's .exe.
GameProcessName = Process name shown in Task Manager (usually the .exe name).
SourceSavePath = Folder containing the live game saves.
BackupStoragePath = Folder where timestamped backups will be stored.
SessionName = Sub-folder name for a playthrough.
SaveFrequencyMinutes = How often to back up while the game is running.
MaxAutoSaves = Maximum backups to keep. Use 0 for unlimited.
LaunchBackup = yes/no. Create a backup immediately before launching.
