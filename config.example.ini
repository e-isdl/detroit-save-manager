[Settings]
GameExecutablePath = C:\Program Files\Detroit Become Human\DetroitBecomeHuman.exe
SourceSavePath = C:\Users\YourName\Saved Games\Quantic Dream\Detroit Become Human
BackupStoragePath = C:\Users\YourName\DetroitSaveBackups
SessionName = default
SaveFrequencyMinutes = 5
MaxAutoSaves = 50
LaunchBackup = yes

[Documentation]
Info = Copy this file to config.ini and edit the Settings section. GameExecutablePath is required.
GameExecutablePath = Full path to your DetroitBecomeHuman.exe.
SourceSavePath = Folder containing the live Detroit: Become Human saves. Defaults to the standard Quantic Dream location if left as is.
BackupStoragePath = Folder where timestamped backups will be stored.
SessionName = Sub-folder name for a playthrough. Change to keep multiple playthroughs separate.
SaveFrequencyMinutes = How often to back up while the game is running.
MaxAutoSaves = Maximum backups to keep. Use 0 for unlimited.
LaunchBackup = yes/no. Create a backup immediately before launching the game.
